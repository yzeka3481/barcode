<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Service Tag Okuyucu</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root{
      --bg:#f4f7fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --line:#dbe3ee;
      --accent:#0f766e; --accent-soft:#e6f4f1; --danger:#dc2626; --danger-soft:#fee2e2;
      --ok:#166534; --ok-soft:#f0fdf4; --warn:#92400e; --warn-soft:#fff7ed;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:680px;
      margin:0 auto;
      padding:10px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:0 8px 18px rgba(15,23,42,.05);
      margin-bottom:10px;
    }
    .title{
      font-size:20px;
      font-weight:700;
      margin:0 0 6px;
    }
    .sub{
      font-size:13px;
      color:var(--muted);
      line-height:1.35;
      margin-bottom:10px;
    }
    .camera-shell{
      position:relative;
      width:100%;
      overflow:hidden;
      border-radius:14px;
      background:#111827;
      aspect-ratio:3/4;
    }
    video, canvas, img{
      width:100%;
      display:block;
      background:#111827;
    }
    .camera-shell video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .guide-box{
      position:absolute;
      left:8%;
      top:14%;
      width:84%;
      height:72%;
      border:3px solid rgba(34,197,94,.95);
      border-radius:12px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.38);
    }
    .guide-label{
      position:absolute;
      left:50%;
      top:calc(14% - 10px);
      transform:translate(-50%, -100%);
      background:rgba(34,197,94,.92);
      color:#fff;
      padding:5px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      white-space:nowrap;
    }
    .match-box{
      position:absolute;
      display:none;
      border:3px solid rgba(245,158,11,.98);
      background:rgba(245,158,11,.12);
      border-radius:10px;
    }
    .row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
      align-items:end;
      margin-top:10px;
    }
    label{
      display:block;
      font-size:13px;
      color:#374151;
      margin-top:10px;
      font-weight:700;
    }
    input{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      font-size:16px;
      margin-top:6px;
      background:#fff;
    }
    .controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    button{
      border:none;
      border-radius:12px;
      padding:13px 12px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }
    .primary{background:var(--accent);color:#fff}
    .secondary{background:var(--accent-soft);color:var(--accent)}
    .danger{background:var(--danger-soft);color:var(--danger)}
    .status{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      background:#f8fafc;
      border:1px solid var(--line);
      color:#334155;
      min-height:42px;
      line-height:1.35;
      font-size:14px;
    }
    .result{
      font-size:20px;
      font-weight:800;
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      background:var(--ok-soft);
      border:1px solid #bbf7d0;
      color:var(--ok);
      word-break:break-word;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      background:#ecfdf5;
      color:#166534;
      margin-top:10px;
    }
    .small{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
      margin-top:6px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:8px;
      font-size:14px;
    }
    th, td{
      border-bottom:1px solid var(--line);
      padding:10px 6px;
      text-align:left;
      vertical-align:top;
    }
    th{background:#f8fafc}
    .mini-btn{
      border:none;
      border-radius:10px;
      padding:8px 10px;
      font-size:13px;
      font-weight:700;
      background:var(--danger-soft);
      color:var(--danger);
    }
    .debug{
      margin-top:8px;
      font-size:11px;
      color:#64748b;
      line-height:1.3;
      word-break:break-word;
    }
    .hidden-canvas{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">Service Tag Okuyucu</div>
      <div class="sub">
        Kamera açılışta çalışır. Referans metni bulununca yanındaki değeri seri no olarak almaya çalışır.
      </div>

      <div class="camera-shell" id="cameraShell">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay">
          <div class="guide-box"></div>
          <div class="guide-label">Etiketi bu alana getir</div>
          <div class="match-box" id="matchBox"></div>
        </div>
      </div>

      <canvas id="frameCanvas" class="hidden-canvas"></canvas>
      <canvas id="cropCanvas" class="hidden-canvas"></canvas>

      <div class="badge" id="autoState">Otomatik okuma açık</div>

      <label for="referenceInput">Referans metni</label>
      <input id="referenceInput" value="Service Tag:" placeholder="Örn: Service Tag:" />

      <label for="manualInput">Bulunan seri no</label>
      <input id="manualInput" placeholder="Otomatik dolacak" />

      <div class="controls">
        <button class="primary" id="saveBtn">Listeye Ekle</button>
        <button class="secondary" id="exportBtn">XLS Dışa Aktar</button>
      </div>

      <div class="controls">
        <button class="danger" id="clearBtn">Tümünü Sil</button>
        <button class="secondary" id="restartBtn">Kamerayı Yenile</button>
      </div>

      <div class="result" id="resultBox">Henüz okunmadı.</div>
      <div class="status" id="statusBox">Kamera hazırlanıyor...</div>
      <div class="small">Tek sütunlu çıktı üretir: yalnızca seri no.</div>
      <div class="debug" id="debugBox"></div>

      <div style="margin-top:10px">
        <label>Son bulunan alan</label>
        <img id="preview" alt="Bulunan alan önizleme" />
      </div>
    </div>

    <div class="card">
      <div class="title" style="font-size:18px">Kayıtlar</div>
      <table id="recordsTable">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th>Seri No</th>
            <th style="width:72px">İşlem</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const frameCanvas = document.getElementById('frameCanvas');
    const cropCanvas = document.getElementById('cropCanvas');
    const preview = document.getElementById('preview');
    const resultBox = document.getElementById('resultBox');
    const statusBox = document.getElementById('statusBox');
    const debugBox = document.getElementById('debugBox');
    const manualInput = document.getElementById('manualInput');
    const referenceInput = document.getElementById('referenceInput');
    const recordsTableBody = document.querySelector('#recordsTable tbody');
    const cameraShell = document.getElementById('cameraShell');
    const matchBox = document.getElementById('matchBox');

    let stream = null;
    let autoTimer = null;
    let ocrBusy = false;
    let lastAcceptedSerial = '';
    let lastAcceptedAt = 0;
    let records = JSON.parse(localStorage.getItem('serial_records_mobile_v1') || '[]');

    function setStatus(msg){ statusBox.textContent = msg; }
    function setResult(msg){ resultBox.textContent = msg; }
    function setDebug(msg){ debugBox.textContent = msg || ''; }

    function normalizeText(s) {
      return String(s || '')
        .toUpperCase()
        .replace(/[|]/g, 'I')
        .replace(/[“”‘’]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function escapeRegex(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function buildLooseReferenceRegex(refText) {
      const chars = normalizeText(refText).replace(/\s+/g, '');
      const parts = chars.split('').map(ch => escapeRegex(ch));
      return new RegExp(parts.join('\\s*'));
    }

    async function startCamera() {
      try {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }
        setStatus('Kamera açılıyor...');
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
        video.srcObject = stream;
        setStatus('Kamera açık. Etiketi çerçeve içine getir.');
        startAutoReading();
      } catch (err) {
        setStatus('Kamera açılamadı: ' + err.message);
      }
    }

    function captureCurrentFrame() {
      if (!video.srcObject || !video.videoWidth || !video.videoHeight) return null;
      frameCanvas.width = video.videoWidth;
      frameCanvas.height = video.videoHeight;
      frameCanvas.getContext('2d').drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);
      return frameCanvas;
    }

    function enhanceForOCR(canvas) {
      const ctx = canvas.getContext('2d');
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i + 1], b = d[i + 2];
        let gray = 0.299 * r + 0.587 * g + 0.114 * b;
        gray = gray > 145 ? 255 : 0;
        d[i] = d[i + 1] = d[i + 2] = gray;
      }
      ctx.putImageData(img, 0, 0);
    }

    function mapSourceToOverlayRect(srcX, srcY, srcW, srcH, sourceCanvas) {
      const shellW = cameraShell.clientWidth;
      const shellH = cameraShell.clientHeight;
      const scale = Math.max(shellW / sourceCanvas.width, shellH / sourceCanvas.height);
      const displayedW = sourceCanvas.width * scale;
      const displayedH = sourceCanvas.height * scale;
      const offsetX = (shellW - displayedW) / 2;
      const offsetY = (shellH - displayedH) / 2;

      return {
        x: offsetX + srcX * scale,
        y: offsetY + srcY * scale,
        w: srcW * scale,
        h: srcH * scale
      };
    }

    function drawMatchBox(rect) {
      matchBox.style.display = 'block';
      matchBox.style.left = rect.x + 'px';
      matchBox.style.top = rect.y + 'px';
      matchBox.style.width = rect.w + 'px';
      matchBox.style.height = rect.h + 'px';
    }

    function extractSerialNearReference(text, referenceText) {
      const cleaned = normalizeText(text);
      const refRegex = buildLooseReferenceRegex(referenceText);
      const refMatch = cleaned.match(refRegex);

      if (!refMatch) return { serial: '', reason: 'Referans bulunamadı.' };

      const after = cleaned.slice(refMatch.index + refMatch[0].length).trim();
      const nearby = after.slice(0, 48);
      const genericRegex = /[A-Z0-9\-]{4,}/;
      const m = nearby.match(genericRegex);
      if (m && m[0]) return { serial: m[0].replace(/\s+/g, ''), reason: 'Bulundu.' };

      const nextChunk = cleaned.slice(refMatch.index, refMatch.index + refMatch[0].length + 80);
      const all = nextChunk.match(/[A-Z0-9\-]{4,}/g);
      if (all && all.length > 0) return { serial: all[all.length - 1].replace(/\s+/g, ''), reason: 'Yakın alandan bulundu.' };

      return { serial: '', reason: 'Referans var ama seri no çıkmadı.' };
    }

    async function runLiveRead() {
      if (ocrBusy) return;

      const referenceText = normalizeText(referenceInput.value);
      if (!referenceText) {
        setStatus('Referans metni gerekli.');
        return;
      }

      const source = captureCurrentFrame();
      if (!source) return;

      ocrBusy = true;
      try {
        setStatus('Etiket taranıyor...');
        const sourceDataUrl = source.toDataURL('image/jpeg', 0.8);
        const result = await Tesseract.recognize(sourceDataUrl, 'eng');
        const rawText = normalizeText(result?.data?.text || '');
        const words = result?.data?.words || [];
        const refRegex = buildLooseReferenceRegex(referenceText);
        const parsed = extractSerialNearReference(rawText, referenceText);

        let matchedWordIndices = [];
        for (let i = 0; i < words.length; i++) {
          const w = normalizeText(words[i].text || '');
          if (!w) continue;
          if (refRegex.test(w.replace(/\s+/g, ''))) matchedWordIndices.push(i);
        }

        if (!matchedWordIndices.length) {
          for (let i = 0; i < words.length - 1; i++) {
            const combo = normalizeText((words[i].text || '') + (words[i + 1].text || ''));
            if (combo && refRegex.test(combo.replace(/\s+/g, ''))) {
              matchedWordIndices = [i, i + 1];
              break;
            }
          }
        }

        if (matchedWordIndices.length) {
          const boxes = matchedWordIndices.map(i => words[i].bbox || words[i].box || null).filter(Boolean);
          if (boxes.length) {
            const left = Math.min(...boxes.map(b => b.x0 ?? b.left ?? 0));
            const top = Math.min(...boxes.map(b => b.y0 ?? b.top ?? 0));
            const right = Math.max(...boxes.map(b => b.x1 ?? b.right ?? 0));
            const bottom = Math.max(...boxes.map(b => b.y1 ?? b.bottom ?? 0));

            const padX = Math.max(90, Math.round((right - left) * 4.5));
            const padY = Math.max(28, Math.round((bottom - top) * 1.7));

            const cropX = Math.max(0, left);
            const cropY = Math.max(0, top - padY);
            const cropW = Math.min(source.width - cropX, (right - left) + padX);
            const cropH = Math.min(source.height - cropY, (bottom - top) + padY * 2);

            cropCanvas.width = cropW;
            cropCanvas.height = cropH;
            cropCanvas.getContext('2d').drawImage(source, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
            enhanceForOCR(cropCanvas);
            preview.src = cropCanvas.toDataURL('image/jpeg', 0.92);

            const rect = mapSourceToOverlayRect(cropX, cropY, cropW, cropH, source);
            drawMatchBox(rect);
          }
        } else {
          matchBox.style.display = 'none';
        }

        if (parsed.serial) {
          const now = Date.now();
          const repeated = parsed.serial === lastAcceptedSerial && (now - lastAcceptedAt < 3000);
          manualInput.value = parsed.serial;
          setResult(parsed.serial);

          if (!repeated) {
            lastAcceptedSerial = parsed.serial;
            lastAcceptedAt = now;
            setStatus('Seri no bulundu.');
          } else {
            setStatus('Aynı seri no tekrar görüldü.');
          }
        } else {
          setResult('Uygun seri no bulunamadı.');
          setStatus(parsed.reason);
        }

        setDebug(`Referans: ${referenceText} | OCR: ${rawText.slice(0, 150)}`);
      } catch (err) {
        setStatus('OCR hatası: ' + err.message);
      } finally {
        ocrBusy = false;
      }
    }

    function startAutoReading() {
      if (autoTimer) clearInterval(autoTimer);
      runLiveRead();
      autoTimer = setInterval(runLiveRead, 2200);
    }

    function renderTable() {
      recordsTableBody.innerHTML = '';
      records.forEach((serial, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${escapeHtml(serial)}</td>
          <td><button class="mini-btn" onclick="deleteRecord(${index})">Sil</button></td>
        `;
        recordsTableBody.appendChild(tr);
      });
    }

    function saveRecords() {
      localStorage.setItem('serial_records_mobile_v1', JSON.stringify(records));
    }

    function addRecord() {
      const serial = manualInput.value.trim().toUpperCase();
      if (!serial) {
        setStatus('Kaydedilecek seri no yok.');
        return;
      }
      if (records.includes(serial)) {
        setStatus('Bu seri no zaten listede var.');
        return;
      }
      records.unshift(serial);
      saveRecords();
      renderTable();
      setStatus('Listeye eklendi.');
    }

    function deleteRecord(index) {
      records.splice(index, 1);
      saveRecords();
      renderTable();
      setStatus('Kayıt silindi.');
    }

    function clearRecords() {
      if (!confirm('Tüm kayıtlar silinsin mi?')) return;
      records = [];
      saveRecords();
      renderTable();
      setStatus('Tüm kayıtlar silindi.');
    }

    function exportXls() {
      if (!records.length) {
        setStatus('Dışa aktaracak kayıt yok.');
        return;
      }

      const rows = [['Seri No'], ...records.map(s => [s])];
      const tableHtml = `
        <table>
          <tr><th>Seri No</th></tr>
          ${records.map(s => `<tr><td>${escapeHtml(s)}</td></tr>`).join('')}
        </table>
      `;
      const html = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office"
              xmlns:x="urn:schemas-microsoft-com:office:excel"
              xmlns="http://www.w3.org/TR/REC-html40">
        <head><meta charset="UTF-8"></head>
        <body>${tableHtml}</body></html>
      `;
      const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'seri-numaralari.xls';
      a.click();
      URL.revokeObjectURL(url);
      setStatus('XLS indirildi.');
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    window.deleteRecord = deleteRecord;

    document.getElementById('saveBtn').addEventListener('click', addRecord);
    document.getElementById('exportBtn').addEventListener('click', exportXls);
    document.getElementById('clearBtn').addEventListener('click', clearRecords);
    document.getElementById('restartBtn').addEventListener('click', startCamera);

    renderTable();
    setTimeout(startCamera, 300);
  </script>
</body>
</html>
